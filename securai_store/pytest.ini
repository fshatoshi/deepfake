[pytest]
# Lance les tests depuis la racine de securai_store/
testpaths     = tests
python_files  = test_*.py
python_classes= Test*
python_functions = test_*

# Affiche les prints / logs pendant les tests (-s) et le résumé court (-q)
addopts = -v --tb=short

# Désactive les warnings torch/ultralytics non actionnables
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning